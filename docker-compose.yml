services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/master1
      DATABASE_NAME: master1
      DATABASE_DIALECT: postgres
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 1h
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: master1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
