version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: master1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: master1_app:dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:root1234@db:3306/master1
    volumes:
      - ./:/app:cached
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    # Run Prisma db push (create schema) then start dev server with hot reload
    command: sh -c "npx prisma db push && npm run dev"

volumes:
  mysql_data:
